name: Executar Extração Selic

on:
  schedule:
    - cron: '0 12 * * *' # Roda todo dia ao meio-dia
  workflow_dispatch:      # Botão para rodar manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python extract.py
      - name: Salvar dados no repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Pipeline: Nova extração $(date +'%Y-%m-%d')" || exit 0
          git push
