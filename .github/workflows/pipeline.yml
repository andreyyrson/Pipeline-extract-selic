name: Pipeline Selic: Extração e Dashboard

on:
  schedule:
    - cron: '0 12 * * *' # Execução diária automática
  workflow_dispatch:      # Permite rodar manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Essencial para salvar os dados e o HTML no repo

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Extração de Dados
        run: python extract.py

      - name: Gerar Dashboard (Médias 3 anos)
        run: python dashboard.py

      - name: Salvar Dados e Dashboard no Repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # Adiciona a pasta de dados e a pasta docs (onde fica o index.html)
          git add data/ docs/
          git commit -m "Pipeline: Extração e Dashboard $(date +'%Y-%m-%d')" || exit 0
          git push